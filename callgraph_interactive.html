const g=document.createElementNS(NS,'g');g.setAttribute('transform',`translate(${p.x},${p.y})`);g.dataset.id=id;g.style.cursor='pointer';
const r=document.createElementNS(NS,'rect');r.setAttribute('width',p.w);r.setAttribute('height',p.h);r.setAttribute('rx','5');r.setAttribute('ry','5');
r.setAttribute('fill',ic?m.color+'12':'#111420');r.setAttribute('stroke',m.color+'30');r.setAttribute('stroke-width','1');g.appendChild(r);
const lb=document.createElementNS(NS,'text');lb.setAttribute('x','11');lb.setAttribute('y',String(p.h/2+1));lb.setAttribute('dominant-baseline','middle');
lb.setAttribute('fill',ic?m.color+'dd':'#8890aa');lb.setAttribute('font-size','10');lb.setAttribute('font-weight',ic?'600':'400');
lb.textContent=(ic?'◆ ':'')+n.label;g.appendChild(lb);
const lt=document.createElementNS(NS,'text');lt.setAttribute('x',String(p.w-7));lt.setAttribute('y',String(p.h/2+1));lt.setAttribute('dominant-baseline','middle');
lt.setAttribute('text-anchor','end');lt.setAttribute('fill','#222640');lt.setAttribute('font-size','8');lt.textContent=':'+n.line;g.appendChild(lt);
const cc=connCount[id];
g.addEventListener('click',e=>{e.stopPropagation();selectNode(id)});
g.addEventListener('mouseenter',e=>{tooltip.innerHTML=`<div class="tt-module">${m.label}</div><div class="tt-func">${n.label}</div><div class="tt-file">${n.type} · line ${n.line}</div><div class="tt-conn">↗ ${cc.out} out · ↙ ${cc.in_} in</div>`;tooltip.style.opacity='1';tooltip.style.left=(e.clientX+16)+'px';tooltip.style.top=(e.clientY-10)+'px'});
g.addEventListener('mousemove',e=>{tooltip.style.left=(e.clientX+16)+'px';tooltip.style.top=(e.clientY-10)+'px'});
g.addEventListener('mouseleave',()=>{tooltip.style.opacity='0'});
nodeLayerG.appendChild(g);nodeEls[id]={g,rect:r,node:n}});

// Pan & Zoom
let scale=0.82,panX=30,panY=10,isPanning=false,psx,psy;
function applyT(){mainG.setAttribute('transform',`translate(${panX},${panY}) scale(${scale})`)}applyT();
canvasEl.addEventListener('wheel',e=>{e.preventDefault();const rc=canvasEl.getBoundingClientRect();const mx=e.clientX-rc.left,my=e.clientY-rc.top;const os=scale;scale=Math.min(4,Math.max(0.12,scale*(e.deltaY<0?1.08:0.93)));panX=mx-(mx-panX)*(scale/os);panY=my-(my-panY)*(scale/os);applyT()},{passive:false});
canvasEl.addEventListener('mousedown',e=>{if(e.target.closest('g[data-id]'))return;isPanning=true;psx=e.clientX-panX;psy=e.clientY-panY;canvasEl.classList.add('grabbing')});
window.addEventListener('mousemove',e=>{if(!isPanning)return;panX=e.clientX-psx;panY=e.clientY-psy;applyT()});
window.addEventListener('mouseup',()=>{isPanning=false;canvasEl.classList.remove('grabbing')});

// ── Selection ──
let sel=null;
function selectNode(id){
  if(execMode||stepMode)return;
  sel=id;const conn=new Set([id]);const ce=new Set();
  edgeEls.forEach((e,i)=>{if(e.src===id||e.tgt===id){conn.add(e.src);conn.add(e.tgt);ce.add(i)}});
  const cm=new Set();conn.forEach(n=>cm.add(nodeToModule[n]));
  Object.entries(nodeEls).forEach(([nid,ne])=>{const hit=conn.has(nid);const m=modules[ne.node.module];
    ne.rect.setAttribute('opacity',hit?'1':'0.06');ne.g.querySelectorAll('text').forEach(t=>t.setAttribute('opacity',hit?'1':'0.06'));
    if(hit&&nid===id){ne.rect.setAttribute('stroke',m.color);ne.rect.setAttribute('stroke-width','2');ne.rect.setAttribute('filter','url(#glow)')}
    else if(hit){ne.rect.setAttribute('stroke',m.color+'88');ne.rect.setAttribute('stroke-width','1.5');ne.rect.removeAttribute('filter')}
    else{ne.rect.setAttribute('stroke-width','.5');ne.rect.removeAttribute('filter')}});
  edgeEls.forEach((e,i)=>{if(ce.has(i)){e.el.setAttribute('stroke',e.color+'88');e.el.setAttribute('stroke-width','1.5');e.ambDots.forEach(d=>d.el.setAttribute('opacity','0.6'))}
    else{e.el.setAttribute('stroke','#0a0c12');e.el.setAttribute('stroke-width','.3');e.ambDots.forEach(d=>d.el.setAttribute('opacity','0'))}});
  mainG.querySelectorAll('.mg').forEach(mg=>{const hit=cm.has(mg.dataset.module);mg.querySelector('rect').setAttribute('opacity',hit?'1':'0.04');mg.querySelector('text').setAttribute('opacity',hit?'1':'0.04')});
}
function resetGraph(){
  sel=null;
  Object.entries(nodeEls).forEach(([nid,ne])=>{const m=modules[ne.node.module];ne.rect.setAttribute('opacity','1');ne.rect.setAttribute('stroke',m.color+'30');ne.rect.setAttribute('stroke-width','1');ne.rect.removeAttribute('filter');ne.g.querySelectorAll('text').forEach(t=>t.setAttribute('opacity','1'))});
  edgeEls.forEach(e=>{e.el.setAttribute('stroke',e.color+'22');e.el.setAttribute('stroke-width','1');if(!e.sameModule)e.el.setAttribute('marker-end',`url(#a-${nodeToModule[e.src]})`);e.ambDots.forEach(d=>d.el.setAttribute('opacity',ambientOn?'0.3':'0'))});
  mainG.querySelectorAll('.mg').forEach(mg=>{mg.querySelector('rect').setAttribute('opacity','1');mg.querySelector('text').setAttribute('opacity','1')});
}
function clearAll(){stopExec();stopStep();resetGraph();updatePanel('—','','','');document.getElementById('ep-bar').style.width='0%';document.getElementById('exec-panel').className=''}
function resetView(){clearAll();scale=0.82;panX=30;panY=10;applyT()}
function onSearch(q){if(sel||execMode||stepMode)return;q=q.toLowerCase().trim();Object.entries(nodeEls).forEach(([id,ne])=>{const m=modules[ne.node.module];if(q&&ne.node.label.toLowerCase().includes(q)){ne.rect.setAttribute('stroke','#ff9e64');ne.rect.setAttribute('stroke-width','2.5');ne.rect.setAttribute('filter','url(#glow)')}else{ne.rect.setAttribute('stroke',m.color+'30');ne.rect.setAttribute('stroke-width','1');ne.rect.removeAttribute('filter')}})}
canvasEl.addEventListener('click',e=>{if(!e.target.closest('g[data-id]'))resetGraph()});

// ── Panel ──
function updatePanel(func,desc,step,hint){
  document.getElementById('ep-func').textContent=func;
  document.getElementById('ep-desc').textContent=desc;
  document.getElementById('ep-step').textContent=step;
  document.getElementById('ep-hint').textContent=hint;
}

// ── Highlight a step ──
function highlightStep(stepIdx){
  const step=execTimeline[stepIdx];
  const key=step.edge[0]+'->'+step.edge[1];
  const ei=edgeMap[key];
  // Dim everything first
  Object.entries(nodeEls).forEach(([nid,ne])=>{const m=modules[ne.node.module];ne.rect.setAttribute('opacity','0.12');ne.rect.setAttribute('stroke',m.color+'15');ne.rect.setAttribute('stroke-width','.5');ne.rect.removeAttribute('filter');ne.g.querySelectorAll('text').forEach(t=>t.setAttribute('opacity','0.12'))});
  edgeEls.forEach(e=>{e.el.setAttribute('stroke',e.color+'08');e.el.setAttribute('stroke-width','.5');e.ambDots.forEach(d=>d.el.setAttribute('opacity','0'))});
  mainG.querySelectorAll('.mg').forEach(mg=>{mg.querySelector('rect').setAttribute('opacity','0.06');mg.querySelector('text').setAttribute('opacity','0.06')});
  // Highlight source + target
  if(ei!==undefined){
    const e=edgeEls[ei];
    e.el.setAttribute('stroke',e.color+'cc');e.el.setAttribute('stroke-width','2.5');
    [e.src,e.tgt].forEach(nid=>{
      if(!nodeEls[nid])return;const m=modules[nodeEls[nid].node.module];
      nodeEls[nid].rect.setAttribute('opacity','1');nodeEls[nid].rect.setAttribute('stroke',m.color);nodeEls[nid].rect.setAttribute('stroke-width','2');nodeEls[nid].rect.setAttribute('filter','url(#glow)');
      nodeEls[nid].g.querySelectorAll('text').forEach(t=>t.setAttribute('opacity','1'));
    });
    // Highlight modules
    const mods=new Set([nodeToModule[e.src],nodeToModule[e.tgt]]);
    mainG.querySelectorAll('.mg').forEach(mg=>{const hit=mods.has(mg.dataset.module);mg.querySelector('rect').setAttribute('opacity',hit?'0.8':'0.06');mg.querySelector('text').setAttribute('opacity',hit?'1':'0.06')});
  }
  const pct=((stepIdx+1)/execTimeline.length*100).toFixed(0);
  document.getElementById('ep-bar').style.width=pct+'%';
  updatePanel(step.label,step.desc,`step ${stepIdx+1} / ${execTimeline.length}`,stepMode?'Space or → for next · ← for previous':'');
}

// ── Exec dot animation ──
let activeExecDots=[];
function spawnExecDot(edgeIdx,color){
  const e=edgeEls[edgeIdx];
  const dot=document.createElementNS(NS,'circle');dot.setAttribute('r','5');dot.setAttribute('fill',color);dot.setAttribute('opacity','0.9');dot.setAttribute('filter','url(#glow-big)');
  execLayerG.appendChild(dot);
  const trails=[];for(let i=0;i<5;i++){const tr=document.createElementNS(NS,'circle');tr.setAttribute('r',String(4-i*.7));tr.setAttribute('fill',color);tr.setAttribute('opacity',String(.35-i*.06));execLayerG.appendChild(tr);trails.push({el:tr})}
  activeExecDots.push({el:dot,trails,t:0,speed:0.006,edge:e,alive:true});
}
function clearExecDots(){activeExecDots.forEach(d=>{d.el.remove();d.trails.forEach(tr=>tr.el.remove())});activeExecDots=[]}

// ── AUTO TRACE ──
let execMode=false;let execIdx=0;let execTimer=null;
function toggleExec(){
  if(execMode){stopExec();return}
  stopStep();resetGraph();
  execMode=true;execIdx=0;
  document.getElementById('btn-exec').textContent='■ stop';document.getElementById('btn-exec').classList.add('active');
  document.getElementById('exec-panel').className='active-exec';
  document.getElementById('ep-label').textContent='Auto Trace';
  runExecAuto();
}
function stopExec(){execMode=false;clearTimeout(execTimer);clearExecDots();document.getElementById('btn-exec').textContent='▶ auto trace';document.getElementById('btn-exec').classList.remove('active')}
function runExecAuto(){
  if(!execMode||execIdx>=execTimeline.length){
    stopExec();updatePanel('✓ Complete','Execution trace finished',`${execTimeline.length}/${execTimeline.length}`,'');return;
  }
  highlightStep(execIdx);
  const key=execTimeline[execIdx].edge[0]+'->'+execTimeline[execIdx].edge[1];
  const ei=edgeMap[key];
  if(ei!==undefined)spawnExecDot(ei,edgeEls[ei].color);
  execIdx++;
  execTimer=setTimeout(runExecAuto,1800);// 1.8s per step — slow enough to follow
}

// ── STEP-BY-STEP ──
let stepMode=false;let stepIdx=0;
function toggleStep(){
  if(stepMode){stopStep();resetGraph();updatePanel('—','','','');return}
  stopExec();resetGraph();
  stepMode=true;stepIdx=0;
  document.getElementById('btn-step').textContent='■ exit steps';document.getElementById('btn-step').classList.add('active');
  document.getElementById('exec-panel').className='active-step';
  document.getElementById('ep-label').textContent='Step-by-Step';
  highlightStep(0);
  updatePanel(execTimeline[0].label,execTimeline[0].desc,`step 1 / ${execTimeline.length}`,'Space or → for next · ← for previous');
  // Spawn dot for first step
  const key=execTimeline[0].edge[0]+'->'+execTimeline[0].edge[1];
  const ei=edgeMap[key];if(ei!==undefined)spawnExecDot(ei,edgeEls[ei].color);
}
function stopStep(){stepMode=false;clearExecDots();document.getElementById('btn-step').textContent='⏭ step-by-step';document.getElementById('btn-step').classList.remove('active')}
function stepForward(){
  if(!stepMode)return;
  if(stepIdx<execTimeline.length-1){stepIdx++;clearExecDots();highlightStep(stepIdx);
    const key=execTimeline[stepIdx].edge[0]+'->'+execTimeline[stepIdx].edge[1];
    const ei=edgeMap[key];if(ei!==undefined)spawnExecDot(ei,edgeEls[ei].color);
  }else{updatePanel('✓ Complete','Execution trace finished',`${execTimeline.length}/${execTimeline.length}`,'Press ← to go back')}
}
function stepBack(){
  if(!stepMode||stepIdx<=0)return;
  stepIdx--;clearExecDots();highlightStep(stepIdx);
  const key=execTimeline[stepIdx].edge[0]+'->'+execTimeline[stepIdx].edge[1];
  const ei=edgeMap[key];if(ei!==undefined)spawnExecDot(ei,edgeEls[ei].color);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){clearAll();return}
  if(stepMode){
    if(e.key===' '||e.key==='ArrowRight'){e.preventDefault();stepForward()}
    else if(e.key==='ArrowLeft'){e.preventDefault();stepBack()}
  }
});

// ── AMBIENT ──
let ambientOn=true;let time=0;
function toggleAmbient(){ambientOn=!ambientOn;document.getElementById('btn-ambient').classList.toggle('active',ambientOn);if(!ambientOn)edgeEls.forEach(e=>e.ambDots.forEach(d=>d.el.setAttribute('opacity','0')))}
edgeEls.forEach(e=>e.ambDots.forEach(d=>d.el.setAttribute('opacity','0.3')));

// ── Main loop ──
function mainLoop(){
  time++;
  // Ambient
  if(ambientOn&&!sel&&!execMode&&!stepMode){
    edgeEls.forEach(e=>{e.ambDots.forEach(d=>{const t=((time*d.speed+d.offset)%1+1)%1;const pt=cubicPt(e.sx,e.sy,e.c1x,e.c1y,e.c2x,e.c2y,e.tx,e.ty,t);d.el.setAttribute('cx',pt.x);d.el.setAttribute('cy',pt.y)})});
  }
  // Exec dots
  for(let i=activeExecDots.length-1;i>=0;i--){
    const d=activeExecDots[i];if(!d.alive)continue;
    d.t+=d.speed;
    if(d.t>=1){
      if(stepMode){d.t=0;continue}// loop in step mode
      d.alive=false;d.el.setAttribute('opacity','0');d.trails.forEach(tr=>tr.el.setAttribute('opacity','0'));
      setTimeout(()=>{d.el.remove();d.trails.forEach(tr=>tr.el.remove())},50);
      activeExecDots.splice(i,1);continue;
    }
    const e=d.edge;const pt=cubicPt(e.sx,e.sy,e.c1x,e.c1y,e.c2x,e.c2y,e.tx,e.ty,d.t);
    d.el.setAttribute('cx',pt.x);d.el.setAttribute('cy',pt.y);
    const fade=d.t>.8?Math.max(0,(1-d.t)/.2):Math.min(1,d.t/.1);
    d.el.setAttribute('opacity',String(.9*fade));
    d.trails.forEach((tr,ti)=>{const tt=Math.max(0,d.t-(ti+1)*.035);const tp=cubicPt(e.sx,e.sy,e.c1x,e.c1y,e.c2x,e.c2y,e.tx,e.ty,tt);tr.el.setAttribute('cx',tp.x);tr.el.setAttribute('cy',tp.y);tr.el.setAttribute('opacity',String(Math.max(0,(.3-ti*.05)*fade)))});
  }
  requestAnimationFrame(mainLoop);
}
mainLoop();
</script>
</body>
</html>
