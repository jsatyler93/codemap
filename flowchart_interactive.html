<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>polaire2() — Flowchart</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#0a0c12;color:#e0e0e0;overflow:hidden;height:100vh;user-select:none}
#toolbar{position:fixed;top:0;left:0;right:0;height:44px;background:#0e1018;border-bottom:1px solid #181c28;display:flex;align-items:center;padding:0 16px;z-index:100;gap:10px}
#toolbar .title{font-family:monospace;font-size:12px;font-weight:600;color:#9ece6a}
#toolbar .subtitle{font-family:monospace;font-size:10px;color:#454a60}
#toolbar .sep{width:1px;height:20px;background:#181c28}
.btn{background:#12151f;border:1px solid #181c28;border-radius:5px;color:#606680;font-size:10px;padding:4px 10px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:#181c2a;border-color:#7aa2f7;color:#c0caf5}
.btn.active{background:#151d35;border-color:#5580cc;color:#7aa2f7}
#canvas{position:absolute;top:44px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab}
#canvas.grabbing{cursor:grabbing}
svg text{font-family:'Consolas','Menlo','Courier New',monospace}
#tooltip{position:fixed;background:#12151fee;border:1px solid #252a3e;border-radius:8px;padding:10px 14px;font-family:monospace;font-size:11px;color:#c0caf5;pointer-events:none;opacity:0;z-index:200;max-width:450px;box-shadow:0 12px 48px rgba(0,0,0,.7);backdrop-filter:blur(6px);transition:opacity .1s;line-height:1.5}
#tooltip .tt-type{font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
#tooltip .tt-code{color:#bb9af7;font-size:10px;margin-top:4px;padding:4px 6px;background:#0a0c1288;border-radius:4px;white-space:pre-wrap}
#info-panel{position:fixed;bottom:14px;left:14px;background:#0e1018ee;border:1px solid #181c28;border-radius:10px;padding:12px 16px;font-size:10px;z-index:100;backdrop-filter:blur(8px);max-width:280px}
#info-panel .ip-title{font-size:8px;text-transform:uppercase;letter-spacing:1.5px;color:#353a50;margin-bottom:6px}
#info-panel .ip-func{color:#9ece6a;font-size:12px;font-weight:600}
#info-panel .ip-file{color:#454a60;font-size:10px;margin-top:2px}
#info-panel .ip-stats{color:#353a50;font-size:9px;margin-top:8px;border-top:1px solid #181c28;padding-top:6px}
#legend{position:fixed;bottom:14px;right:14px;background:#0e1018ee;border:1px solid #181c28;border-radius:10px;padding:12px 16px;font-size:10px;z-index:100;backdrop-filter:blur(8px)}
#legend .lg-title{font-size:8px;text-transform:uppercase;letter-spacing:1.5px;color:#353a50;margin-bottom:6px}
.lg-item{display:flex;align-items:center;gap:8px;margin-bottom:4px;color:#606680;font-size:10px}
.lg-shape{width:18px;height:12px;border-radius:2px;flex-shrink:0}
.lg-diamond{width:14px;height:14px;transform:rotate(45deg);flex-shrink:0;margin:0 2px}
</style>
</head>
<body>
<div id="toolbar">
  <span class="title">polaire2()</span>
  <span class="subtitle">correlosos_bidim_s.py:177</span>
  <span class="sep"></span>
  <button class="btn active" id="btn-flow" onclick="toggleFlow()">ambient flow</button>
  <button class="btn" onclick="resetView()">reset</button>
</div>
<div id="canvas"></div>
<div id="tooltip"></div>
<div id="info-panel">
  <div class="ip-title">Function</div>
  <div class="ip-func">polaire2(rt, ...)</div>
  <div class="ip-file">correlosos_bidim_s.py · line 177</div>
  <div class="ip-stats">Calculates polar coordinates and pupil mask of a telescope. Translated from IDL POLAIRE2.pro.</div>
</div>
<div id="legend">
  <div class="lg-title">Node Types</div>
  <div class="lg-item"><span class="lg-shape" style="background:#9ece6a20;border:1px solid #9ece6a50;border-radius:10px"></span>Start / Return</div>
  <div class="lg-item"><span class="lg-shape" style="background:#7aa2f720;border:1px solid #7aa2f750"></span>Process</div>
  <div class="lg-item"><span class="lg-diamond" style="background:#e0af6820;border:1px solid #e0af6850"></span>Decision</div>
  <div class="lg-item"><span class="lg-shape" style="background:#f7768e20;border:1px solid #f7768e50"></span>Error / Raise</div>
  <div class="lg-item"><span class="lg-shape" style="background:#bb9af720;border:1px solid #bb9af750"></span>Computation</div>
  <div class="lg-item"><span class="lg-shape" style="background:#73daca20;border:1px solid #73daca50"></span>Output build</div>
</div>
<script>
// ── Flowchart nodes ──
// Types: start, end, process, decision, error, compute, output
const nodes = [
  {id:'start',type:'start',label:'polaire2(rt, ...)',x:400,y:30,w:180,h:32},

  {id:'chk_version',type:'decision',label:'version_flag?',x:400,y:100,w:140,h:50},
  {id:'print_version',type:'process',label:'print version string',x:620,y:100,w:170,h:28},

  {id:'chk_help',type:'decision',label:'help_flag?',x:400,y:185,w:140,h:50},
  {id:'print_help',type:'process',label:'print docstring\nreturn {}',x:620,y:185,w:170,h:36},

  {id:'chk_rt',type:'decision',label:'rt valid?\n(positive number)',x:400,y:275,w:160,h:55},
  {id:'err_rt',type:'error',label:'raise ValueError("RT...")',x:620,y:275,w:190,h:28},

  {id:'chk_oc',type:'decision',label:'0 ≤ oc < 1?',x:400,y:370,w:140,h:50},
  {id:'err_oc',type:'error',label:'raise ValueError("OC...")',x:620,y:370,w:190,h:28},

  {id:'det_largeur',type:'decision',label:'largeur\nprovided & > 0?',x:400,y:460,w:160,h:55},
  {id:'largeur_set',type:'process',label:'largeur_calc = largeur',x:620,y:445,w:190,h:28},
  {id:'chk_entre4',type:'decision',label:'entre4pixels?',x:400,y:555,w:140,h:50},
  {id:'larg_even',type:'process',label:'largeur = 2·round(rt)\n(even width)',x:230,y:555,w:190,h:36},
  {id:'larg_odd',type:'process',label:'largeur = 2·floor(rt)+1\n(odd width)',x:620,y:555,w:200,h:36},

  {id:'det_centre',type:'process',label:'Determine centre_x, centre_y\n(from input or (L-1)/2)',x:400,y:645,w:240,h:36},

  {id:'chk_prolixe1',type:'decision',label:'prolixe?',x:400,y:720,w:120,h:45},
  {id:'print_params',type:'process',label:'print L, cx, cy',x:580,y:720,w:150,h:28},

  {id:'mk_grid',type:'compute',label:'Create coordinate grids\ny_idx, x_idx = np.indices((L,L))\nx_map = x - cx\ny_map = y - cy',x:400,y:805,w:260,h:56},

  {id:'chk_rho_need',type:'decision',label:'rho_out or masque_out\nor points_utiles?',x:400,y:905,w:200,h:55},
  {id:'calc_rho',type:'compute',label:'rho = √(x²+y²) / rt',x:400,y:1000,w:180,h:30},

  {id:'chk_phi_need',type:'decision',label:'phi_out or\npoints_utiles?',x:400,y:1075,w:160,h:50},
  {id:'calc_phi',type:'compute',label:'phi = arctan2(y, x)',x:400,y:1165,w:180,h:30},

  {id:'chk_mask_need',type:'decision',label:'masque_out or\npoints_utiles?',x:400,y:1240,w:160,h:50},
  {id:'chk_leq',type:'decision',label:'leq?',x:400,y:1330,w:100,h:45},
  {id:'mask_leq',type:'compute',label:'mask = (rho ≤ 1) & (rho ≥ oc)',x:260,y:1330,w:230,h:28},
  {id:'mask_lt',type:'compute',label:'mask = (rho < 1) & (rho ≥ oc)',x:580,y:1330,w:230,h:28},

  {id:'build_results',type:'output',label:'Build results dict\n{largeur, cx, cy, rho?, phi?, masque?}',x:400,y:1420,w:270,h:40},

  {id:'chk_pts',type:'decision',label:'return_useful\n_points_info?',x:400,y:1505,w:160,h:55},
  {id:'calc_pts',type:'compute',label:'points_utiles = flatnonzero(mask)\nrho = rho[pts]\nphi = phi[pts]',x:400,y:1600,w:260,h:48},

  {id:'cleanup',type:'process',label:'Remove unrequested\nkeys from results',x:400,y:1690,w:200,h:36},

  {id:'end',type:'start',label:'return results',x:400,y:1770,w:160,h:32},
];

// ── Edges ──
// Each edge: [fromId, toId, label?, side?]
// side: 'yes'/'no'/'true'/'false' for decision branches
const edges = [
  ['start','chk_version'],
  ['chk_version','print_version','yes','right'],
  ['chk_version','chk_help','no'],
  ['print_version','chk_help','','down'],

  ['chk_help','print_help','yes','right'],
  ['chk_help','chk_rt','no'],

  ['chk_rt','err_rt','invalid','right'],
  ['chk_rt','chk_oc','valid'],

  ['chk_oc','err_oc','invalid','right'],
  ['chk_oc','det_largeur','valid'],

  ['det_largeur','largeur_set','yes','right'],
  ['det_largeur','chk_entre4','no'],
  ['largeur_set','det_centre','','down'],
  ['chk_entre4','larg_even','yes','left'],
  ['chk_entre4','larg_odd','no','right'],
  ['larg_even','det_centre','','down'],
  ['larg_odd','det_centre','','down'],

  ['det_centre','chk_prolixe1'],
  ['chk_prolixe1','print_params','yes','right'],
  ['chk_prolixe1','mk_grid','no'],
  ['print_params','mk_grid','','down'],

  ['mk_grid','chk_rho_need'],
  ['chk_rho_need','calc_rho','yes'],
  ['calc_rho','chk_phi_need'],
  ['chk_rho_need','chk_phi_need','no','skip'],

  ['chk_phi_need','calc_phi','yes'],
  ['calc_phi','chk_mask_need'],
  ['chk_phi_need','chk_mask_need','no','skip'],

  ['chk_mask_need','chk_leq','yes'],
  ['chk_mask_need','build_results','no','skip'],
  ['chk_leq','mask_leq','yes','left'],
  ['chk_leq','mask_lt','no','right'],
  ['mask_leq','build_results','','down'],
  ['mask_lt','build_results','','down'],

  ['build_results','chk_pts'],
  ['chk_pts','calc_pts','yes'],
  ['chk_pts','cleanup','no','skip'],
  ['calc_pts','cleanup'],

  ['cleanup','end'],
];

// Colors by type
const typeColors = {
  start:'#9ece6a', end:'#9ece6a', process:'#7aa2f7', decision:'#e0af68',
  error:'#f7768e', compute:'#bb9af7', output:'#73daca'
};

// ── SVG Setup ──
const NS='http://www.w3.org/2000/svg';
const canvasEl=document.getElementById('canvas');
const svg=document.createElementNS(NS,'svg');svg.setAttribute('width','100%');svg.setAttribute('height','100%');canvasEl.appendChild(svg);
const mainG=document.createElementNS(NS,'g');svg.appendChild(mainG);
const defs=document.createElementNS(NS,'defs');svg.appendChild(defs);

// Glow
function mkGlow(id,std){const f=document.createElementNS(NS,'filter');f.setAttribute('id',id);f.setAttribute('x','-100%');f.setAttribute('y','-100%');f.setAttribute('width','300%');f.setAttribute('height','300%');const gb=document.createElementNS(NS,'feGaussianBlur');gb.setAttribute('stdDeviation',String(std));gb.setAttribute('result','b');f.appendChild(gb);const fm=document.createElementNS(NS,'feMerge');['b','SourceGraphic'].forEach(a=>{const n=document.createElementNS(NS,'feMergeNode');n.setAttribute('in',a);fm.appendChild(n)});f.appendChild(fm);defs.appendChild(f)}
mkGlow('glow',3);mkGlow('glow-big',6);

// Arrow markers
function mkMarker(id,col){const m=document.createElementNS(NS,'marker');m.setAttribute('id',id);m.setAttribute('viewBox','0 0 10 6');m.setAttribute('refX','10');m.setAttribute('refY','3');m.setAttribute('markerWidth','7');m.setAttribute('markerHeight','5');m.setAttribute('orient','auto');const p=document.createElementNS(NS,'path');p.setAttribute('d','M0,.5 L9,3 L0,5.5 Z');p.setAttribute('fill',col);m.appendChild(p);defs.appendChild(m)}
Object.entries(typeColors).forEach(([k,c])=>mkMarker('a-'+k,c));
mkMarker('a-default','#454a60');

// Layers
const edgeLayer=document.createElementNS(NS,'g');mainG.appendChild(edgeLayer);
const dotLayer=document.createElementNS(NS,'g');mainG.appendChild(dotLayer);
const nodeLayer=document.createElementNS(NS,'g');mainG.appendChild(nodeLayer);

// Build node lookup
const nodeMap={};
nodes.forEach(n=>{nodeMap[n.id]=n});

// ── Draw nodes ──
const nodeEls={};
const tooltip=document.getElementById('tooltip');

nodes.forEach(n=>{
  const col=typeColors[n.type]||'#7aa2f7';
  const g=document.createElementNS(NS,'g');
  g.setAttribute('transform',`translate(${n.x-n.w/2},${n.y})`);
  g.style.cursor='pointer';
  g.dataset.id=n.id;

  let shape;
  if(n.type==='decision'){
    // Diamond
    shape=document.createElementNS(NS,'polygon');
    const cx=n.w/2,cy=n.h/2;
    shape.setAttribute('points',`${cx},0 ${n.w},${cy} ${cx},${n.h} 0,${cy}`);
    shape.setAttribute('fill',col+'12');shape.setAttribute('stroke',col+'40');shape.setAttribute('stroke-width','1.2');
  } else if(n.type==='start'||n.type==='end'){
    shape=document.createElementNS(NS,'rect');
    shape.setAttribute('width',n.w);shape.setAttribute('height',n.h);shape.setAttribute('rx','16');shape.setAttribute('ry','16');
    shape.setAttribute('fill',col+'18');shape.setAttribute('stroke',col+'50');shape.setAttribute('stroke-width','1.2');
  } else {
    shape=document.createElementNS(NS,'rect');
    shape.setAttribute('width',n.w);shape.setAttribute('height',n.h);shape.setAttribute('rx','5');shape.setAttribute('ry','5');
    shape.setAttribute('fill',col+'10');shape.setAttribute('stroke',col+'35');shape.setAttribute('stroke-width','1');
  }
  g.appendChild(shape);

  // Label (multiline support)
  const lines=n.label.split('\n');
  lines.forEach((line,i)=>{
    const t=document.createElementNS(NS,'text');
    t.setAttribute('x',String(n.w/2));
    const totalH=lines.length*13;
    t.setAttribute('y',String(n.h/2-totalH/2+i*13+10));
    t.setAttribute('text-anchor','middle');t.setAttribute('fill',col+'cc');t.setAttribute('font-size','9.5');
    if(n.type==='start'||n.type==='end')t.setAttribute('font-weight','600');
    t.textContent=line;g.appendChild(t);
  });

  g.addEventListener('mouseenter',e=>{
    const typeLabel={start:'Entry',end:'Return',process:'Process',decision:'Condition',error:'Error',compute:'Computation',output:'Output'}[n.type];
    tooltip.innerHTML=`<div class="tt-type" style="color:${col}">${typeLabel}</div><div>${n.label.replace(/\n/g,'<br>')}</div>`;
    tooltip.style.opacity='1';tooltip.style.left=(e.clientX+16)+'px';tooltip.style.top=(e.clientY-10)+'px';
  });
  g.addEventListener('mousemove',e=>{tooltip.style.left=(e.clientX+16)+'px';tooltip.style.top=(e.clientY-10)+'px'});
  g.addEventListener('mouseleave',()=>{tooltip.style.opacity='0'});

  nodeLayer.appendChild(g);
  nodeEls[n.id]={g,shape,node:n,col};
});

// ── Draw edges ──
function getAnchor(n,side){
  const cx=n.x,cy=n.y+n.h/2;
  if(side==='top')return{x:cx,y:n.y};
  if(side==='bottom')return{x:cx,y:n.y+n.h};
  if(side==='left')return{x:n.x-n.w/2,y:cy};
  if(side==='right')return{x:n.x+n.w/2,y:cy};
  return{x:cx,y:cy};
}

function cubicPt(sx,sy,c1x,c1y,c2x,c2y,tx,ty,t){const u=1-t;return{x:u*u*u*sx+3*u*u*t*c1x+3*u*t*t*c2x+t*t*t*tx,y:u*u*u*sy+3*u*u*t*c1y+3*u*t*t*c2y+t*t*t*ty}}

const edgeEls=[];

edges.forEach(([fromId,toId,label,hint])=>{
  const fn=nodeMap[fromId],tn=nodeMap[toId];
  if(!fn||!tn)return;
  const fromCol=typeColors[fn.type]||'#454a60';

  // Determine anchors based on relative positions
  let sp,tp;
  const dy=tn.y-fn.y,dx=tn.x-fn.x;

  if(hint==='right'){
    sp=getAnchor(fn,'right');tp=getAnchor(tn,'left');
  }else if(hint==='left'){
    sp=getAnchor(fn,'left');tp=getAnchor(tn,'right');
  }else if(hint==='down'){
    sp=getAnchor(fn,'bottom');tp=getAnchor(tn,'top');
  }else if(hint==='skip'){
    // Skip connection — goes around the right side
    sp=getAnchor(fn,'right');tp=getAnchor(tn,'right');
  }else{
    // Default: bottom to top
    sp=getAnchor(fn,'bottom');tp=getAnchor(tn,'top');
  }

  let d,c1x,c1y,c2x,c2y;
  if(hint==='skip'){
    // Route around the right
    const rx=Math.max(sp.x,tp.x)+60;
    d=`M${sp.x},${sp.y} C${rx},${sp.y} ${rx},${tp.y} ${tp.x},${tp.y}`;
    c1x=rx;c1y=sp.y;c2x=rx;c2y=tp.y;
  }else if(Math.abs(dx)>100&&Math.abs(dy)<20){
    // Horizontal
    const mx=(sp.x+tp.x)/2;
    c1x=mx;c1y=sp.y;c2x=mx;c2y=tp.y;
    d=`M${sp.x},${sp.y} C${c1x},${c1y} ${c2x},${c2y} ${tp.x},${tp.y}`;
  }else{
    const my=(sp.y+tp.y)/2;
    c1x=sp.x;c1y=my;c2x=tp.x;c2y=my;
    d=`M${sp.x},${sp.y} C${c1x},${c1y} ${c2x},${c2y} ${tp.x},${tp.y}`;
  }

  const path=document.createElementNS(NS,'path');
  path.setAttribute('d',d);path.setAttribute('fill','none');
  path.setAttribute('stroke',fromCol+'25');path.setAttribute('stroke-width','1');
  path.setAttribute('marker-end',`url(#a-${fn.type})`);
  edgeLayer.appendChild(path);

  // Edge label
  if(label){
    const mid=cubicPt(sp.x,sp.y,c1x,c1y,c2x,c2y,tp.x,tp.y,0.35);
    const lt=document.createElementNS(NS,'text');
    lt.setAttribute('x',mid.x+(hint==='right'||hint==='left'?0:-12));
    lt.setAttribute('y',mid.y-4);
    lt.setAttribute('text-anchor','middle');lt.setAttribute('fill',fromCol+'66');lt.setAttribute('font-size','8');
    lt.textContent=label;edgeLayer.appendChild(lt);
  }

  // Ambient dots
  const ambDots=[];
  const dot=document.createElementNS(NS,'circle');dot.setAttribute('r','1.3');dot.setAttribute('fill',fromCol);dot.setAttribute('opacity','0');
  dotLayer.appendChild(dot);
  ambDots.push({el:dot,offset:Math.random(),speed:0.0006+Math.random()*0.0004});

  edgeEls.push({path,sx:sp.x,sy:sp.y,c1x,c1y,c2x,c2y,tx:tp.x,ty:tp.y,color:fromCol,ambDots});
});

// ── Pan & Zoom ──
let scale=0.65,panX=80,panY=20,isPanning=false,psx,psy;
function applyT(){mainG.setAttribute('transform',`translate(${panX},${panY}) scale(${scale})`)}applyT();
canvasEl.addEventListener('wheel',e=>{e.preventDefault();const rc=canvasEl.getBoundingClientRect();const mx=e.clientX-rc.left,my=e.clientY-rc.top;const os=scale;scale=Math.min(4,Math.max(0.15,scale*(e.deltaY<0?1.08:0.93)));panX=mx-(mx-panX)*(scale/os);panY=my-(my-panY)*(scale/os);applyT()},{passive:false});
canvasEl.addEventListener('mousedown',e=>{if(e.target.closest('g[data-id]'))return;isPanning=true;psx=e.clientX-panX;psy=e.clientY-panY;canvasEl.classList.add('grabbing')});
window.addEventListener('mousemove',e=>{if(!isPanning)return;panX=e.clientX-psx;panY=e.clientY-psy;applyT()});
window.addEventListener('mouseup',()=>{isPanning=false;canvasEl.classList.remove('grabbing')});

// ── Ambient animation ──
let flowOn=true;let time=0;
function toggleFlow(){flowOn=!flowOn;document.getElementById('btn-flow').classList.toggle('active',flowOn);if(!flowOn)edgeEls.forEach(e=>e.ambDots.forEach(d=>d.el.setAttribute('opacity','0')))}
function resetView(){scale=0.65;panX=80;panY=20;applyT()}

edgeEls.forEach(e=>e.ambDots.forEach(d=>d.el.setAttribute('opacity','0.4')));

function mainLoop(){
  time++;
  if(flowOn){
    edgeEls.forEach(e=>{e.ambDots.forEach(d=>{
      const t=((time*d.speed+d.offset)%1+1)%1;
      const pt=cubicPt(e.sx,e.sy,e.c1x,e.c1y,e.c2x,e.c2y,e.tx,e.ty,t);
      d.el.setAttribute('cx',pt.x);d.el.setAttribute('cy',pt.y);
    })});
  }
  requestAnimationFrame(mainLoop);
}
mainLoop();

document.addEventListener('keydown',e=>{if(e.key==='Escape')resetView()});
</script>
</body>
</html>
